  # Ollama（可选）：启用 AI 投资顾问功能，需要 ECS 内存 ≥ 8G
  # 若无需 AI 功能或内存不足，注释掉 ollama 和 ollama-init 服务即可
  # ollama:
  #   image: ollama/ollama
  #   container_name: astock-ollama
  #   restart: unless-stopped
  #   volumes:
  #     - ollama_data:/root/.ollama
  #   ports:
  #     - "11434:11434"
  #   healthcheck:
  #     test: ["CMD-SHELL", "curl -sf http://localhost:11434/api/tags || exit 1"]
  #     interval: 15s
  #     timeout: 5s
  #     retries: 10
  #     start_period: 20s

  # # 首次启动时自动拉取模型，拉取完成后自动退出
  # ollama-init:
  #   image: ollama/ollama
  #   container_name: astock-ollama-init
  #   restart: "no"
  #   environment:
  #     OLLAMA_HOST: http://ollama:11434
  #   entrypoint: ["sh", "-c", "sleep 5 && ollama pull ${OLLAMA_MODEL:-qwen2.5:3b}"]
  #   depends_on:
  #     ollama:
  #       condition: service_healthy

  app:
    build: .
    container_name: astock-app
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    env_file:
      - .env
    environment:
      DOCKER_ENV: "true"
      PORT: ${PORT:-3000}
      HTTPS_ENABLED: ${HTTPS_ENABLED:-false}
      # 使用 ECS 自带 MySQL，通过 Docker 桥接网关访问宿主机
      MYSQL_HOST: 172.17.0.1
      JWT_SECRET: ${JWT_SECRET}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      # 容器内使用服务名访问 Ollama，覆盖 .env 中的 localhost 地址
      OLLAMA_BASE_URL: http://ollama:11434
    # depends_on:
      # ollama:
      #   condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    deploy:
      resources:
        limits:
          memory: 1g
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:${PORT:-3000}/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  # db_data:
  ollama_data: