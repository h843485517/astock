services:
  db:
    image: mysql:8.0
    container_name: astock-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama
    container_name: astock-ollama
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:11434/api/tags || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

  # 首次启动时自动拉取模型，拉取完成后自动退出
  ollama-init:
    image: ollama/ollama
    container_name: astock-ollama-init
    restart: "no"
    environment:
      OLLAMA_HOST: http://ollama:11434
    entrypoint: ["sh", "-c", "sleep 5 && ollama pull ${OLLAMA_MODEL:-qwen2.5:3b}"]
    depends_on:
      ollama:
        condition: service_healthy

  app:
    build: .
    container_name: astock-app
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    env_file:
      - .env
    environment:
      MYSQL_HOST: db
      JWT_SECRET: ${JWT_SECRET}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      # 容器内使用服务名访问 Ollama，覆盖 .env 中的 localhost 地址
      OLLAMA_BASE_URL: http://ollama:11434
    depends_on:
      db:
        condition: service_healthy
      ollama:
        condition: service_healthy

volumes:
  db_data:
  ollama_data: